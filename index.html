<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 智能提举导引系统 | 实时扫码版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config Fallback for Local Execution
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "DEMO", authDomain: "demo", projectId: "demo", storageBucket: "demo", messagingSenderId: "000", appId: "000" };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isAdmin = false;
        let currentBalance = "居中";
        let videoStream = null;
        let isScanning = false;

        window.el = (id) => document.getElementById(id);
        window.show = (id) => window.el(id)?.classList.remove('hidden');
        window.hide = (id) => window.el(id)?.classList.add('hidden');

        // Login Logic
        window.handleLogin = async (workerId) => {
            if (!workerId) return;
            isAdmin = (workerId === '000001');
            localStorage.setItem('qr_system_worker_id', workerId);
            window.el('loginStage').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                window.hide('loginStage');
                window.show('appContent');
                window.el('profileUserName').innerText = isAdmin ? "系统管理员" : "作业员 " + workerId;
                window.el('profileUserID').innerText = "工号: " + workerId;
                window.switchTab('scan');
            }, 300);
        };

        window.handleLogout = () => {
            stopCamera();
            localStorage.removeItem('qr_system_worker_id');
            location.reload();
        };

        window.switchTab = (tab) => {
            if (tab !== 'scan') stopCamera();
            ['profile', 'scan', 'cargo'].forEach(t => window.el(t + 'Page')?.classList.add('hidden'));
            window.el(tab + 'Page')?.classList.remove('hidden');
            window.el('pageTitle').innerText = { profile: '账户中心', scan: '实时扫描', cargo: '资源管理' }[tab];
        };

        // Enhanced Camera Logic
        window.startCamera = async () => {
            if (isScanning) return;
            
            // UI Feedback
            window.el('scanStatusText').innerText = "正在请求摄像头权限... 喵";
            
            try {
                const constraints = { 
                    video: { 
                        facingMode: "environment", 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    } 
                };
                
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                const video = window.el('videoPreview');
                
                video.srcObject = videoStream;
                video.setAttribute("playsinline", true); // Required for iOS
                
                await video.play();
                
                isScanning = true;
                requestAnimationFrame(tick);
                
                window.hide('scanPlaceholder');
                window.show('videoPreview');
                window.el('scanStatusText').innerText = "请将二维码对准框内 喵";
            } catch (err) {
                console.error("Camera Error Details:", err);
                let errorMsg = "无法启动摄像头 喵 😿";
                if (err.name === 'NotAllowedError') errorMsg = "摄像头权限被拒绝了，请在浏览器设置中开启 喵 🛡️";
                if (err.name === 'NotFoundError') errorMsg = "未找到摄像头设备 喵 🔍";
                
                alert(errorMsg);
                window.el('scanStatusText').innerText = "扫描开启失败，请重试 喵";
            }
        };

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
            isScanning = false;
            window.show('scanPlaceholder');
            window.hide('videoPreview');
            window.el('scanStatusText').innerText = "点击开启镜头扫码 喵";
        }

        function tick() {
            if (!isScanning) return;
            const video = window.el('videoPreview');
            
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert"
                });

                if (code) {
                    try {
                        const data = JSON.parse(code.data);
                        // Trigger Haptic if available
                        if (navigator.vibrate) navigator.vibrate(200);
                        
                        window.el('resW').innerText = data.w;
                        window.el('resB').innerText = `重心位置: ${data.b}`;
                        window.show('resultPanel');
                        stopCamera();
                    } catch (e) {
                        console.warn("Invalid QR Content");
                    }
                }
            }
            requestAnimationFrame(tick);
        }

        window.generateQR = async () => {
            const weight = window.el('inputWeight').value;
            if (!weight) return;
            const id = "PKG-" + Math.random().toString(36).substr(2, 4).toUpperCase();
            const qrContent = JSON.stringify({ id, w: weight, b: currentBalance });
            window.el('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrContent)}`;
            window.el('qrLabel').innerText = `${id} | ${weight}KG`;
            window.hide('createForm');
            window.show('qrResult');
        };

        window.setBalance = (val) => {
            currentBalance = val;
            document.querySelectorAll('.balance-btn').forEach(btn => {
                btn.className = btn.innerText === val 
                    ? "balance-btn p-3 bg-blue-600 text-white rounded-xl text-[10px] font-bold"
                    : "balance-btn p-3 bg-gray-100 text-gray-500 rounded-xl text-[10px] font-bold";
            });
        };

        window.onload = () => {
            const savedId = localStorage.getItem('qr_system_worker_id');
            if (savedId) window.handleLogin(savedId);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; overflow: hidden; }
        .scan-line { width: 100%; height: 2px; background: #3b82f6; position: absolute; top: 0; animation: scan 2s infinite linear; box-shadow: 0 0 8px #3b82f6; z-index: 5; }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }
        #videoPreview { background: #000; }
    </style>
</head>
<body class="max-w-md mx-auto h-screen flex flex-col relative bg-white shadow-2xl">

    <!-- Login Screen -->
    <div id="loginStage" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-8 transition-opacity duration-500">
        <div class="w-full text-center space-y-10">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto flex items-center justify-center shadow-xl rotate-3">
                <svg class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
            </div>
            <div class="space-y-4">
                <input id="loginUser" type="text" class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-blue-500 outline-none text-center text-xl font-bold" placeholder="输入工号 (001)">
                <button onclick="window.handleLogin(window.el('loginUser').value)" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold">进入系统</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="appContent" class="hidden flex flex-col h-full">
        <header class="p-6 flex items-center justify-between border-b bg-white shrink-0">
            <h2 id="pageTitle" class="text-xl font-black text-slate-800 tracking-tight">实时扫描</h2>
            <button onclick="handleLogout()" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Logout</button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 pb-24 bg-slate-50/50">
            <div id="scanPage" class="pt-4 h-full flex flex-col items-center">
                <div class="relative w-full aspect-square max-w-[280px] bg-black rounded-[3rem] shadow-2xl overflow-hidden border-4 border-white">
                    <video id="videoPreview" class="hidden w-full h-full object-cover" muted></video>
                    <div id="scanPlaceholder" onclick="window.startCamera()" class="absolute inset-0 flex flex-col items-center justify-center cursor-pointer bg-slate-900 group">
                        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white mb-4 group-active:scale-95 transition-transform">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /></svg>
                        </div>
                        <p id="scanStatusText" class="text-[10px] font-black text-blue-400 tracking-[0.2em] uppercase px-4 text-center leading-relaxed">点击开启镜头扫码 喵</p>
                    </div>
                    <div class="scan-line"></div>
                </div>
                <p class="mt-8 text-center text-[10px] text-slate-400 leading-relaxed font-medium tracking-wide">请确保环境光线充足喵 💡<br>扫码成功后系统将自动分析搬运策略 喵 爱心！</p>
            </div>

            <div id="cargoPage" class="hidden space-y-6">
                <button onclick="window.show('createForm')" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-100">登记新货物</button>
                <div id="createForm" class="hidden bg-white p-6 rounded-3xl shadow-sm border space-y-4">
                    <input id="inputWeight" type="number" class="w-full p-4 rounded-xl bg-slate-50 border-none font-bold" placeholder="输入重量 (KG)">
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="window.setBalance('居中')" class="balance-btn p-3 bg-blue-600 text-white rounded-xl text-[10px]">居中</button>
                        <button onclick="window.setBalance('偏左')" class="balance-btn p-3 bg-gray-100 text-gray-400 rounded-xl text-[10px]">偏左</button>
                        <button onclick="window.setBalance('偏右')" class="balance-btn p-3 bg-gray-100 text-gray-400 rounded-xl text-[10px]">偏右</button>
                    </div>
                    <button onclick="window.generateQR()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold">生成二维码</button>
                </div>
                <div id="qrResult" class="hidden text-center p-8 bg-white rounded-3xl border shadow-sm">
                    <img id="qrImage" class="w-48 h-48 mx-auto mb-4 rounded-lg shadow-sm" alt="Generated QR">
                    <p id="qrLabel" class="text-xs font-mono text-blue-600 font-bold mb-4"></p>
                    <button onclick="window.hide('qrResult')" class="text-xs font-bold text-slate-300 uppercase">返回</button>
                </div>
            </div>

            <div id="profilePage" class="hidden flex flex-col items-center pt-10">
                <div class="w-24 h-24 bg-blue-50 text-blue-600 rounded-[2.5rem] flex items-center justify-center text-4xl mb-6 shadow-inner">👤</div>
                <h3 id="profileUserName" class="text-2xl font-black text-slate-800">--</h3>
                <p id="profileUserID" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">ID: --</p>
            </div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 h-24 bg-white/80 backdrop-blur-xl border-t flex items-center justify-around px-8 max-w-md mx-auto z-50">
            <button onclick="window.switchTab('profile')" class="flex flex-col items-center gap-1 text-slate-300 hover:text-blue-400 transition-colors"><span class="text-[10px] font-black uppercase tracking-widest">账户</span></button>
            <button onclick="window.switchTab('scan')" class="flex flex-col items-center gap-1 text-blue-600"><span class="text-[10px] font-black uppercase tracking-widest">扫描</span></button>
            <button onclick="window.switchTab('cargo')" class="flex flex-col items-center gap-1 text-slate-300 hover:text-blue-400 transition-colors"><span class="text-[10px] font-black uppercase tracking-widest">资源</span></button>
        </nav>
    </div>

    <!-- Result Modal -->
    <div id="resultPanel" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="window.hide('resultPanel'); window.startCamera();"></div>
        <div class="relative bg-white w-full rounded-[3rem] p-10 text-center space-y-8 shadow-2xl transform transition-transform">
            <div class="w-16 h-16 bg-green-500 rounded-full mx-auto flex items-center justify-center text-white shadow-lg shadow-green-100">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
            </div>
            <div class="space-y-2">
                <p class="text-6xl font-black text-slate-900 tracking-tighter"><span id="resW">--</span><span class="text-xl text-slate-400 ml-1">KG</span></p>
                <p id="resB" class="text-[11px] font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-full inline-block mt-4 uppercase tracking-wider">--</p>
            </div>
            <button onclick="window.hide('resultPanel'); window.startCamera();" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-sm uppercase tracking-[0.2em] shadow-xl">继续扫描</button>
        </div>
    </div>
</body>
</html>
